version: 2

models:

  - name: stg_transactions_enriched
    columns:
    - name: value
      data_tests:
        - assert_value_amount_positive

  - name: stg_transactions
    descriptions: Transactions in the Ethereum Blockchain
    columns:
    - name: hash
      descriptions: >
        This is a very long multiline description about the unique
        identofier of each transaction in the Ethereum blockchain
      data_tests:
        - unique
        - not_null


  - name: stablecoin_activity_per_day
    latest_version: 1
    config:
      contract:
          enforced: true
    columns:
      - name: date
        data_type: date
        description: ""

      - name: token_address
        data_type: varchar
        description: ""

      - name: type
        data_type: varchar
        description: ""

      - name: symbol
        data_type: varchar
        description: ""

      - name: total_usd_value
        data_type: float
        description: ""

    versions:

      - v: 1
        deprecation_date: 2030-01-01

      - v: 2

        columns:
          - include: all
            exclude: [token_address, symbol]
